name: svf-python

# Triggers the workflow on push or pull request events
on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-20.04, macos-11]
    steps:
      # checkout the repo
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 12
          
      # setup the environment 
      - name: mac-setup
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 12.5.1
      - name: mac-setup-workaround
        if: runner.os == 'macOS'
        run: |
          ln -sfn /Applications/Xcode_12.5.1.app /Applications/Xcode.app
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          brew install zlib-ng unzip cmake gcc nodejs npm pybind11
      - name: ubuntu-setup
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get upgrade
          sudo apt-get install zlib1g-dev unzip cmake gcc g++ nodejs libtinfo5 python3 npm python3-pybind11
          
      # install llvm and svf
      - name: env-setup
        run: |
          npm i --silent svf-tools
          
      # build current repo
      - name: build-svf
        run: |
          cd $GITHUB_WORKSPACE
          source $GITHUB_WORKSPACE/env.sh
          cmake .
          make 

